{% extends "base.html" %}
{% block title %}로그인 · {{ bank_name }}{% endblock %}
{% block body %}
<div class="auth-wrap">
  <img class="auth-logo" src="{{ url_for('static', filename='img/logo-finpick.png') }}" alt="FinPick">
  <h2>로그인</h2>
  <p class="sub">FinPick에 오신 것을 환영합니다.</p>
  <form method="post">
    <div class="field">
      <label>아이디</label>
      <input name="username" autofocus required>
    </div>
    <div class="field">
      <label>비밀번호</label>
      <input name="password" type="password" required>
    </div>
    <button class="btn btn-primary btn-block btn-lg" type="submit">로그인</button>
  </form>
  <div class="auth-foot">아직 회원이 아니신가요? <a href="{{ url_for('register') }}">회원가입</a></div>
</div>
{% endblock %}
