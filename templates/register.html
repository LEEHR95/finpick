{% extends "base.html" %}
{% block title %}회원가입 · {{ bank_name }}{% endblock %}
{% block body %}
<div class="auth-wrap">
  <h2>회원가입</h2>
  <p class="sub">가입하면 계좌가 자동 개설되고 축하금 100만원이 입금돼요.</p>
  <form method="post">
    <div class="field">
      <label>이름</label>
      <input name="name" autofocus required>
    </div>
    <div class="field">
      <label>아이디</label>
      <input name="username" required>
    </div>
    <div class="field">
      <label>비밀번호 (4자 이상)</label>
      <input name="password" type="password" required>
    </div>
    <button class="btn btn-primary btn-block btn-lg" type="submit">가입하기</button>
    <p class="agree-note">가입하면 <a href="{{ url_for('terms') }}">이용약관</a> 및
      <a href="{{ url_for('privacy') }}">개인정보처리방침</a>에 동의하는 것으로 간주됩니다.</p>
  </form>
  <div class="auth-foot">이미 회원이신가요? <a href="{{ url_for('login') }}">로그인</a></div>
</div>
{% endblock %}
