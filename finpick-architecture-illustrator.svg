<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="1120" viewBox="0 0 2000 1120">
  <defs>
    <style>
      .title { font: 700 30px 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; fill: #111827; }
      .section { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; }
      .section-label { font: 700 20px 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; fill: #334155; }
      .label { font: 700 14px 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; fill: #0f172a; text-anchor: middle; }
      .small { font: 500 13px 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; fill: #334155; text-anchor: middle; }
      .box-blue { fill: #dbeafe; stroke: #3b82f6; stroke-width: 2; }
      .box-purple { fill: #efe1ff; stroke: #8b5cf6; stroke-width: 2; }
      .box-purple-soft { fill: #ede9fe; stroke: #7c3aed; stroke-width: 2; }
      .box-green { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; }
      .box-orange { fill: #ffedd5; stroke: #f97316; stroke-width: 2; }
      .box-red { fill: #ffe4e6; stroke: #ef4444; stroke-width: 2; }
      .legend { font: 600 13px 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; fill: #334155; }
    </style>

    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b5cf6"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#f97316"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="2000" height="1120" fill="#ffffff"/>
  <text x="90" y="55" class="title">핀픽 시스템 아키텍처</text>

  <rect x="70" y="90" width="1860" height="230" rx="22" class="section"/>
  <rect x="70" y="360" width="1860" height="220" rx="22" class="section"/>
  <rect x="70" y="620" width="1860" height="360" rx="22" class="section"/>
  <text x="95" y="122" class="section-label">입력 / 운영 / 적재 소스</text>
  <text x="95" y="392" class="section-label">실시간 서비스 계층</text>
  <text x="95" y="652" class="section-label">저장소 / 메시지 / 외부 연동</text>

  <g>
    <line x1="1470" y1="48" x2="1505" y2="48" fill="none" stroke="#8b5cf6" stroke-width="4" marker-end="url(#arrow-purple)"/>
    <text x="1520" y="53" class="legend">에이전트</text>
    <line x1="1605" y1="48" x2="1640" y2="48" fill="none" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow-blue)"/>
    <text x="1655" y="53" class="legend">서비스</text>
    <line x1="1730" y1="48" x2="1765" y2="48" fill="none" stroke="#16a34a" stroke-width="3.5" marker-end="url(#arrow-green)"/>
    <text x="1780" y="53" class="legend">데이터</text>
    <line x1="1470" y1="74" x2="1505" y2="74" fill="none" stroke="#f97316" stroke-width="3.5" marker-end="url(#arrow-orange)"/>
    <text x="1520" y="79" class="legend">메시징</text>
    <line x1="1605" y1="74" x2="1640" y2="74" fill="none" stroke="#ef4444" stroke-width="3.5" marker-end="url(#arrow-red)"/>
    <text x="1655" y="79" class="legend">외부 API</text>
  </g>

  <!-- Top row -->
  <g>
    <rect x="110" y="160" width="180" height="86" rx="18" class="box-blue"/>
    <text x="200" y="193" class="label">사용자 브라우저</text>
    <text x="200" y="217" class="small">웹 화면 + FAB 상담</text>

    <rect x="330" y="164" width="150" height="78" rx="18" class="box-blue"/>
    <text x="405" y="210" class="label">관리자 / 운영자</text>

    <rect x="540" y="158" width="230" height="90" rx="18" class="box-purple"/>
    <text x="655" y="191" class="label">bank_agents.py</text>
    <text x="655" y="215" class="small">에이전트 워크플로</text>

    <rect x="830" y="164" width="190" height="78" rx="18" class="box-purple-soft"/>
    <text x="925" y="196" class="label">fetch_fss.py</text>
