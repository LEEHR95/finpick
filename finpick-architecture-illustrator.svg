  <path d="M250 520 L250 620 L190 620 L190 760" fill="none" stroke="#16a34a" stroke-width="3.5" marker-end="url(#arrow-green)"/>
  <path d="M300 520 L300 620 L410 620 L410 760" fill="none" stroke="#16a34a" stroke-width="3.5" marker-end="url(#arrow-green)"/>
  <path d="M350 520 L350 620 L640 620 L640 760" fill="none" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <path d="M400 520 L400 620 L880 620 L880 754" fill="none" stroke="#16a34a" stroke-width="3.5" marker-end="url(#arrow-green)"/>
  <path d="M440 470 L600 470" fill="none" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <path d="M440 490 L960 490" fill="none" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <path d="M440 510 L1290 510" fill="none" stroke="#f97316" stroke-width="3.5" marker-end="url(#arrow-orange)"/>

