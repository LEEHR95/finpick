    <rect x="1570" y="158" width="250" height="90" rx="18" class="box-purple-soft"/>
    <text x="1695" y="191" class="label">seed_consult_kb.py</text>
    <text x="1695" y="215" class="small">상담 KB 시드</text>
  </g>

  <!-- Middle row -->
  <g>
    <rect x="210" y="430" width="230" height="90" rx="18" class="box-blue"/>
    <text x="325" y="463" class="label">bank_web.py</text>
    <text x="325" y="487" class="small">Flask + Socket.IO</text>

    <rect x="600" y="430" width="230" height="90" rx="18" class="box-blue"/>
    <text x="715" y="463" class="label">rag_core.py</text>
