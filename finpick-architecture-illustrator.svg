  <path d="M960 470 L830 470" fill="none" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <path d="M1405 520 L1405 580 L1740 580 L1740 430" fill="none" stroke="#f97316" stroke-width="3.5" marker-end="url(#arrow-orange)"/>
  <path d="M1680 520 L1680 900 L230 900 L230 842" fill="none" stroke="#16a34a" stroke-width="3.5" marker-end="url(#arrow-green)"/>
  <path d="M1710 520 L1710 880 L980 880 L980 848" fill="none" stroke="#16a34a" stroke-width="3.5" marker-end="url(#arrow-green)"/>

