    <rect x="1380" y="754" width="220" height="94" rx="18" class="box-red"/>
    <text x="1490" y="787" class="label">Upstage API</text>
    <text x="1490" y="811" class="small">채팅 / 임베딩 / OCR</text>

    <rect x="1670" y="680" width="190" height="74" rx="18" class="box-orange"/>
    <text x="1765" y="710" class="label">bank-consult</text>
    <text x="1765" y="732" class="small">상담 메시지 토픽</text>

    <rect x="1650" y="782" width="210" height="74" rx="18" class="box-orange"/>
    <text x="1755" y="812" class="label">bank-transfer-requests</text>
    <text x="1755" y="834" class="small">비동기 이체 요청 토픽</text>

    <rect x="1670" y="884" width="190" height="74" rx="18" class="box-orange"/>
    <text x="1765" y="914" class="label">bank-transfers</text>
    <text x="1765" y="936" class="small">이체 이벤트 토픽</text>
  </g>

  <!-- Blue: user/admin/service -->
