    <rect x="1290" y="430" width="230" height="90" rx="18" class="box-orange"/>
    <text x="1405" y="463" class="label">Kafka 브로커</text>
    <text x="1405" y="487" class="small">localhost:9092</text>

    <rect x="1620" y="430" width="240" height="90" rx="18" class="box-blue"/>
    <text x="1740" y="463" class="label">이체 요청 컨슈머</text>
    <text x="1740" y="487" class="small">bank_web.py 내부</text>
  </g>

  <!-- Bottom row -->
  <g>
    <rect x="100" y="760" width="180" height="82" rx="18" class="box-green"/>
    <text x="190" y="792" class="label">bank_db.py</text>
    <text x="190" y="816" class="small">SQLite</text>

    <rect x="320" y="760" width="180" height="82" rx="18" class="box-green"/>
    <text x="410" y="792" class="label">cache.py</text>
    <text x="410" y="816" class="small">TTL 캐시</text>

    <rect x="540" y="760" width="200" height="82" rx="18" class="box-green"/>
    <text x="640" y="792" class="label">monitoring.py</text>
    <text x="640" y="816" class="small">로컬 모니터링</text>

    <rect x="800" y="754" width="220" height="94" rx="18" class="box-green"/>
    <text x="910" y="787" class="label">Elasticsearch</text>
    <text x="910" y="811" class="small">상품 + 이체 로그</text>

    <rect x="1090" y="760" width="220" height="82" rx="18" class="box-green"/>
    <text x="1200" y="792" class="label">store.pkl</text>
