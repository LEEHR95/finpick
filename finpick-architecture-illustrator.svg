  <path d="M715 520 L715 620 L1200 620 L1200 760" fill="none" stroke="#16a34a" stroke-width="3.5" marker-end="url(#arrow-green)"/>
  <path d="M760 520 L760 620 L1490 620 L1490 754" fill="none" stroke="#ef4444" stroke-width="3.5" marker-end="url(#arrow-red)"/>

